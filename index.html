<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D 地球（ちきゅう）モデル</title>
<style>
  :root {
    --bg-top: #0a1a2f;
    --bg-bottom: #02060f;
    --panel: rgba(255,255,255,0.08);
    --panel-border: rgba(255,255,255,0.18);
    --text: #eaf2ff;
    --accent: #4ea8ff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: radial-gradient(circle at 50% 30%, var(--bg-top), var(--bg-bottom));
    font-family: "BIZ UDPGothic", "BIZ UDGothic", "Hiragino Sans", sans-serif;
    color: var(--text);
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #canvas-wrap { position: fixed; inset: 0; }
  canvas { display: block; touch-action: none; }

  .panel {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    justify-content: center;
    background: rgba(2, 6, 15, 0.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    padding: 8px 10px; border-radius: 16px;
    max-width: calc(100vw - 24px);
  }
  .btn {
    appearance: none; border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.06); color: var(--text);
    font: inherit; font-size: 15px; font-weight: 600;
    padding: 10px 16px; border-radius: 12px; cursor: pointer;
    min-height: 44px; transition: background 0.15s, border-color 0.15s, transform 0.05s;
  }
  .btn:hover { background: rgba(255,255,255,0.14); }
  .btn:active { transform: scale(0.96); }
  .btn.on { outline: 2px solid var(--accent); outline-offset: 1px; }
  .btn.season { padding: 10px 14px; font-size: 15px; }

  .hint {
    position: fixed; top: 52px; left: 0; right: 0; text-align: center;
    font-size: 13px; opacity: 0.7; pointer-events: none;
    transition: opacity 0.6s;
  }

  .loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 15px; opacity: 0.8; z-index: 5; transition: opacity 0.4s;
  }
  .loading.hide { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="canvas-wrap"></div>
<div class="hint" id="hint">ドラッグで まわせます。ピンチ／ホイールで 大きさを かえられます。</div>
<div class="loading" id="loading">読み込み中…</div>
<div class="panel">
  <button class="btn on" id="rotateBtn">自動回転</button>
  <button class="btn" id="resetBtn">元に戻す</button>
  <button class="btn season on" id="springBtn" data-season="spring">春</button>
  <button class="btn season" id="summerBtn" data-season="summer">夏</button>
  <button class="btn season" id="autumnBtn" data-season="autumn">秋</button>
  <button class="btn season" id="winterBtn" data-season="winter">冬</button>
  <button class="btn" id="contrastBtn">コントラスト強</button>
  <button class="btn" id="axisBtn">地軸</button>
  <button class="btn" id="equatorBtn">赤道</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  const wrap = document.getElementById('canvas-wrap');
  const loading = document.getElementById('loading');

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 5);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  wrap.appendChild(renderer.domElement);

  // ---- ライト ----
  const AXIS_TILT = 23.4 * Math.PI / 180; // 地軸の傾き
  const ambient = new THREE.AmbientLight(0xffffff, 0.35);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xffffff, 1.1);
  scene.add(sun);

  // ---- 地軸の傾き（常に右に23.4°で固定）----
  // 地軸も自転軸も「右上」に23.4°傾けたまま固定する。
  // 北極が右上にあり、北極点（自転軸）は季節が変わっても動かない。
  // 季節で変わるのは「太陽の光の向き」だけ（公転による位置関係を表す）。
  const SUN_DISTANCE = 6;

  // 季節ごとの太陽光の向き（光源の位置）
  //   夏: 右から太陽が当たる（北極側＝右上がよく照らされる）
  //   冬: 左から太陽が当たる（南極側＝左下がよく照らされる）
  //   春・秋: 手前から奥（横から）当たる
  const SEASON_SUN_POSITION = {
    summer: new THREE.Vector3( 1, 0, 0),  // 右から
    winter: new THREE.Vector3(-1, 0, 0),  // 左から
    spring: new THREE.Vector3( 0, 0,  1),  // 手前から
    autumn: new THREE.Vector3( 0, 0, -1)   // 奥から
  };

  // 自転は earthSpin のローカルY軸で行う。
  // earthTilt が地軸の傾きを担当しているので、結果的に
  // 「傾いた地軸での自転」になる（spinAxis の自前計算は不要）。

  function setupAxis() {
    // 地軸（傾き）を「右に23.4°」で固定。北極が右上を向く。
    earthTilt.rotation.set(0, 0, 0);
    earthTilt.rotateZ(-AXIS_TILT);
  }

  function setSeason(season) {
    const p = SEASON_SUN_POSITION[season];
    sun.position.copy(p).multiplyScalar(SUN_DISTANCE);
  }

  // ---- 地球画像（GitHubから読み込み）----
  // ※ 画像を差し替えた場合は、このURLだけ変更すればOK
  const EARTH_TEXTURE_URL = 'https://sorafjah.github.io/earth3D/earth1024.jpg';

  // ---- 地球 ----
  const viewGroup = new THREE.Group(); // ドラッグ操作・自動回転（視点）
  scene.add(viewGroup);

  const earthTilt = new THREE.Group(); // 地軸の傾き（季節で変化）
  viewGroup.add(earthTilt);

  const earthSpin = new THREE.Group(); // 自転（傾いた軸で回転）
  earthTilt.add(earthSpin);

  setupAxis();      // 地軸を右23.4°に固定
  setSeason('spring'); // 初期の光の向き

  const earthGeo = new THREE.SphereGeometry(1.5, 64, 64);
  const earthMat = new THREE.MeshPhongMaterial({
    color: 0x335577, // 画像読込前の仮の色
    shininess: 12,
    specular: new THREE.Color(0x223344)
  });
  const earth = new THREE.Mesh(earthGeo, earthMat);
  earthSpin.add(earth);

  // ---- 地軸・赤道ガイド（ボタンで表示切替）----
  // 赤道(赤)・地軸(黄)。テクスチャの赤道(球の中央=緯度0)に合わせて
  // earthSpin に入れることで、傾き・自転と一緒に動く。
  const equatorGeo = new THREE.TorusGeometry(1.51, 0.008, 8, 80);
  const equatorMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
  const equatorRing = new THREE.Mesh(equatorGeo, equatorMat);
  equatorRing.rotation.x = Math.PI / 2; // 赤道面（水平）に寝かせる
  equatorRing.visible = false;
  earthSpin.add(equatorRing);

  const axisGeo = new THREE.CylinderGeometry(0.008, 0.008, 3.4, 8);
  const axisMat = new THREE.MeshBasicMaterial({ color: 0xffdd33 });
  const axisLine = new THREE.Mesh(axisGeo, axisMat);
  axisLine.visible = false;
  earthSpin.add(axisLine);

  const loader = new THREE.TextureLoader();
  loader.load(EARTH_TEXTURE_URL, (tex) => {
    tex.anisotropy = 4;
    earthMat.map = tex;
    earthMat.color.set(0xffffff);
    earthMat.needsUpdate = true;
    loading.classList.add('hide');
  }, undefined, () => {
    loading.textContent = '画像の読み込みに失敗しました';
  });

  // ---- 大気の光（フレネル風）----
  const atmGeo = new THREE.SphereGeometry(1.65, 48, 48);
  const atmMat = new THREE.ShaderMaterial({
    transparent: true, side: THREE.BackSide, depthWrite: false,
    uniforms: { glowColor: { value: new THREE.Color(0x4ea8ff) } },
    vertexShader: `
      varying float intensity;
      void main() {
        vec3 n = normalize(normalMatrix * normal);
        vec3 v = normalize(normalMatrix * vec3(0.0,0.0,1.0));
        intensity = pow(0.62 - dot(n, v), 3.0);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }`,
    fragmentShader: `
      varying float intensity;
      uniform vec3 glowColor;
      void main() {
        gl_FragColor = vec4(glowColor, 1.0) * clamp(intensity,0.0,1.0);
      }`
  });
  scene.add(new THREE.Mesh(atmGeo, atmMat));

  // ---- 星空 ----
  const starGeo = new THREE.BufferGeometry();
  const starCount = 1200, pos = new Float32Array(starCount*3);
  for (let i = 0; i < starCount; i++) {
    const r = 60 + Math.random()*40;
    const t = Math.random()*Math.PI*2, p = Math.acos(2*Math.random()-1);
    pos[i*3]   = r*Math.sin(p)*Math.cos(t);
    pos[i*3+1] = r*Math.sin(p)*Math.sin(t);
    pos[i*3+2] = r*Math.cos(p);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color:0xffffff, size:0.3, sizeAttenuation:true })));

  // ---- 操作（ドラッグ回転・ピンチ/ホイールズーム）----
  let auto = true;
  let rotX = 0, rotY = 0;          // 現在の回転（視点）
  let velX = 0, velY = 0;            // 慣性
  let dragging = false, lastX = 0, lastY = 0;
  let pinchDist = 0;

  const el = renderer.domElement;

  function pointerDown(x, y) { dragging = true; lastX = x; lastY = y; velX = velY = 0; }
  function pointerMove(x, y) {
    if (!dragging) return;
    const dx = x - lastX, dy = y - lastY;
    rotY += dx * 0.006;
    rotX += dy * 0.006;
    rotX = Math.max(-Math.PI/2+0.05, Math.min(Math.PI/2-0.05, rotX));
    velY = dx * 0.006; velX = dy * 0.006;
    lastX = x; lastY = y;
  }
  function pointerUp() { dragging = false; }

  // マウス
  el.addEventListener('mousedown', e => pointerDown(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => pointerMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', pointerUp);
  el.addEventListener('wheel', e => {
    e.preventDefault();
    camera.position.z = Math.max(2.4, Math.min(10, camera.position.z + e.deltaY * 0.002));
  }, { passive: false });

  // タッチ（iPad）
  el.addEventListener('touchstart', e => {
    if (e.touches.length === 1) pointerDown(e.touches[0].clientX, e.touches[0].clientY);
    else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchDist = Math.hypot(dx, dy);
    }
  }, { passive: false });
  el.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) pointerMove(e.touches[0].clientX, e.touches[0].clientY);
    else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const d = Math.hypot(dx, dy);
      if (pinchDist) {
        camera.position.z = Math.max(2.4, Math.min(10, camera.position.z - (d - pinchDist) * 0.01));
      }
      pinchDist = d;
    }
  }, { passive: false });
  el.addEventListener('touchend', e => { if (e.touches.length === 0) pointerUp(); pinchDist = 0; });

  // ---- ボタン ----
  const rotateBtn = document.getElementById('rotateBtn');
  const resetBtn = document.getElementById('resetBtn');
  const seasonBtns = document.querySelectorAll('.btn.season');
  const contrastBtn = document.getElementById('contrastBtn');
  const hint = document.getElementById('hint');

  rotateBtn.addEventListener('click', () => {
    auto = !auto; rotateBtn.classList.toggle('on', auto);
  });
  resetBtn.addEventListener('click', () => {
    rotX = 0; rotY = 0; velX = velY = 0; camera.position.z = 5;
  });

  seasonBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      setSeason(btn.dataset.season);
      seasonBtns.forEach(b => b.classList.toggle('on', b === btn));
      // 視点を正面（地軸が右上23.4°に正しく見える向き）に戻す
      rotX = 0; rotY = 0; velX = velY = 0;
    });
  });

  // コントラストモード切替（暗い部分をより暗くする）
  const AMBIENT_NORMAL = 0.35;
  const AMBIENT_HIGH_CONTRAST = 0.08;
  let highContrast = false;
  contrastBtn.addEventListener('click', () => {
    highContrast = !highContrast;
    ambient.intensity = highContrast ? AMBIENT_HIGH_CONTRAST : AMBIENT_NORMAL;
    contrastBtn.classList.toggle('on', highContrast);
    contrastBtn.textContent = highContrast ? 'コントラスト元に戻す' : 'コントラスト強';
  });

  // 地軸・赤道ガイドの表示切替
  const axisBtn = document.getElementById('axisBtn');
  const equatorBtn = document.getElementById('equatorBtn');
  axisBtn.addEventListener('click', () => {
    axisLine.visible = !axisLine.visible;
    axisBtn.classList.toggle('on', axisLine.visible);
  });
  equatorBtn.addEventListener('click', () => {
    equatorRing.visible = !equatorRing.visible;
    equatorBtn.classList.toggle('on', equatorRing.visible);
  });

  // 数秒でヒントを薄く
  setTimeout(() => { hint.style.opacity = '0'; }, 5000);

  // ---- ループ ----
  const SPIN_SPEED = 0.0016;
  function animate() {
    requestAnimationFrame(animate);

    // 視点側のドラッグ回転（慣性）
    if (!dragging) {
      rotY += velX ? velY : 0;
      rotX += velX;
      rotX = Math.max(-Math.PI/2+0.05, Math.min(Math.PI/2-0.05, rotX));
      velX *= 0.94; velY *= 0.94;
      if (Math.abs(velX) < 0.0001) velX = 0;
      if (Math.abs(velY) < 0.0001) velY = 0;
    }
    viewGroup.rotation.y = rotY;
    viewGroup.rotation.x = rotX;

    // 地球の自転：earthSpin のローカルY軸で回す。
    // earthTilt が傾いているので「傾いた地軸での自転」になる。
    if (auto && velX === 0 && velY === 0) {
      earthSpin.rotation.y += SPIN_SPEED;
    }

    renderer.render(scene, camera);
  }
  animate();

  // ---- リサイズ ----
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
})();
</script>
</body>
</html>
